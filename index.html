<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff6fd8 0%, #ff9a3c 30%, #ffe066 55%, #43e97b 80%, #38f9d7 100%);
      background-attachment: fixed;
      color: #1a0533;
      overflow-x: hidden;
    }
    .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:.35; pointer-events:none; z-index:0; animation:drift 10s ease-in-out infinite alternate; }
    .b1{width:420px;height:420px;background:#ff6fd8;top:-120px;left:-80px;}
    .b2{width:360px;height:360px;background:#43e97b;bottom:-80px;right:-80px;animation-delay:-5s;}
    .b3{width:280px;height:280px;background:#ffe066;top:40%;left:60%;animation-delay:-3s;}
    @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(24px,18px) scale(1.06);}}

    .wrapper { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:48px 24px 80px; }

    header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:36px; animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both; }
    .logo { display:flex; align-items:center; gap:14px; }
    .logo-icon { font-size:48px; filter:drop-shadow(0 4px 12px rgba(0,0,0,.2)); animation:wobble 3s ease-in-out infinite; }
    @keyframes wobble{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
    .logo-text { font-family:'Boogaloo',cursive; font-size:clamp(2.2rem,7vw,3.6rem); color:#fff; text-shadow:0 3px 0 rgba(0,0,0,.15),0 6px 24px rgba(180,60,255,.2); line-height:1; letter-spacing:.02em; }
    .logo-sub { font-size:13px; font-weight:700; color:rgba(255,255,255,.75); letter-spacing:.06em; text-transform:uppercase; margin-top:4px; }
    .pill-count { background:rgba(255,255,255,.45); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,.6); border-radius:50px; padding:8px 20px; font-size:15px; font-weight:900; color:#5500aa; white-space:nowrap; }

    .search-wrap { position:relative; margin-bottom:30px; animation:popIn .6s .08s cubic-bezier(.34,1.56,.64,1) both; }
    .search-wrap input { width:100%; background:rgba(255,255,255,.45); backdrop-filter:blur(12px); border:2px solid rgba(255,255,255,.6); border-radius:50px; padding:14px 20px 14px 52px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; color:#1a0533; outline:none; transition:background .2s,border-color .2s,box-shadow .2s; }
    .search-wrap input::placeholder { color:rgba(26,5,51,.4); }
    .search-wrap input:focus { background:rgba(255,255,255,.65); border-color:rgba(255,255,255,.9); box-shadow:0 0 0 4px rgba(255,255,255,.2); }
    .search-ico { position:absolute; left:18px; top:50%; transform:translateY(-50%); font-size:20px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:20px; }

    /* Icon-style card */
    .card {
      background:rgba(255,255,255,.35); backdrop-filter:blur(16px);
      border:2px solid rgba(255,255,255,.6); border-radius:24px;
      padding:28px 16px 20px;
      text-decoration:none; color:#1a0533;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      position:relative; overflow:hidden;
      transition:transform .22s cubic-bezier(.34,1.56,.64,1), background .2s, box-shadow .2s;
      animation:popIn .5s both;
      cursor:pointer;
      text-align:center;
    }
    .card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 60%); pointer-events:none; }
    .card:hover { transform:translateY(-8px) scale(1.06); background:rgba(255,255,255,.55); box-shadow:0 20px 48px rgba(180,60,255,.2),0 2px 8px rgba(0,0,0,.08); }
    .card:active { transform:scale(.96); }

    .card-emoji {
      font-size:52px; line-height:1;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.15));
      transition:transform .2s;
    }
    .card:hover .card-emoji { transform:scale(1.15) rotate(-5deg); }

    .card-name { font-size:14px; font-weight:900; letter-spacing:-.01em; line-height:1.2; color:#1a0533; }
    .card-file { font-size:10px; font-weight:700; color:rgba(26,5,51,.38); letter-spacing:.03em; }

    .no-results { grid-column:1/-1; text-align:center; padding:60px 20px; font-size:15px; font-weight:700; color:rgba(26,5,51,.5); }
    .no-results .big { font-size:48px; display:block; margin-bottom:10px; }

    @keyframes popIn{from{opacity:0;transform:scale(.82) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}

    /* Add game hint */
    .hint {
      margin-top: 32px;
      background: rgba(255,255,255,.28);
      border: 2px dashed rgba(255,255,255,.55);
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(26,5,51,.45);
      text-align: center;
      letter-spacing: .02em;
    }
    .hint code { background:rgba(0,0,0,.07); border-radius:5px; padding:1px 6px; font-size:11px; color:#5500aa; }

    footer { margin-top:24px; text-align:center; font-size:12px; font-weight:700; color:rgba(255,255,255,.6); letter-spacing:.05em; }
  </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="wrapper">
  <header>
    <div class="logo">
      <span class="logo-icon">🕹️</span>
      <div>
        <div class="logo-text">Games</div>
        <div class="logo-sub">Pick a game &amp; play!</div>
      </div>
    </div>
    <div class="pill-count" id="countPill">0 games</div>
  </header>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Search games…" autocomplete="off"/>
  </div>

  <div class="grid" id="grid"></div>

  <div class="hint">
    ➕ To add a game, just add its filename below in the <code>GAMES</code> list inside this file.
  </div>

  <footer>Click any game to play · index.html auto-excluded</footer>
</div>

<script>
  // ── ADD YOUR GAME FILES HERE ──────────────────────────────
  // Just the filename. They must be in the same folder as index.html.
  const GAMES = [
    'Snake.html',
    'Flappy Bird.html',
    'tictactoe.html',
  ];
  // ─────────────────────────────────────────────────────────

  const EMOJI_MAP = [
    ['snake','🐍'],['flappy','🐦'],['tetris','🟦'],['breakout','🧱'],
    ['pong','🏓'],['memory','🃏'],['quiz','📝'],['space','🚀'],
    ['shoot','🎯'],['car','🚗'],['race','🏎️'],['jump','🏃'],
    ['dino','🦕'],['bird','🐤'],['fish','🐠'],['fruit','🍎'],
    ['math','🔢'],['word','🔤'],['color','🎨'],['click','👆'],
    ['runner','👟'],['tank','🪖'],['zombie','🧟'],['tower','🗼'],
    ['chess','♟️'],['puzzle','🧩'],['platformer','🕹️'],['adventure','🗺️'],
    ['clicker','💰'],['castle','🏰'],['ninja','🥷'],['sword','⚔️'],
    ['ball','⚽'],['basket','🏀'],['idle','💤'],['tictac','❌'],
    ['2048','🔢'],['mine','💣'],['pac','👻'],['mario','🍄'],
  ];
  const POOL = ['🎮','🕹️','⭐','💥','🎯','🏆','🎲','🎪','🌟','🔥'];

  function getEmoji(name) {
    const l = name.toLowerCase();
    for (const [k,e] of EMOJI_MAP) if (l.includes(k)) return e;
    const s = [...name].reduce((a,c)=>a+c.charCodeAt(0),0);
    return POOL[s % POOL.length];
  }

  function getLabel(name) {
    return name.replace(/\.html?$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }

  const data = GAMES.map(name => ({
    name,
    label: getLabel(name),
    emoji: getEmoji(name),
    url: name,   // relative — opens the file right next to index.html
  }));

  let allData = data;

  function render(list) {
    document.getElementById('countPill').textContent = list.length === 1 ? '1 game' : `${list.length} games`;
    const g = document.getElementById('grid');
    g.innerHTML = '';
    if (!list.length) {
      g.innerHTML = `<div class="no-results"><span class="big">🔍</span>No games match that search.</div>`;
      return;
    }
    list.forEach((f,i) => {
      const a = document.createElement('a');
      a.href = f.url;
      a.className = 'card';
      a.style.animationDelay = (.08 + i*.05) + 's';
      a.innerHTML = `
        <div class="card-emoji">${f.emoji}</div>
        <div class="card-name">${f.label}</div>
        <div class="card-file">${f.name}</div>`;
      g.appendChild(a);
    });
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    render(q ? allData.filter(f => f.name.toLowerCase().includes(q) || f.label.toLowerCase().includes(q)) : allData);
  });

  render(allData);
</script>
</body>
</html>
